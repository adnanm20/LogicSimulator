<!DOCTYPE html>
<html>
	<head>
		<title>Logic Simulator</title>
	</head>
	<link rel="stylesheet" href="./style.css">
	<body>
		<header>Logic Simulator ------ support -- login</header>
		<main>
			<div class="toolbar">
				<div class="tools">
					<div class="hand" onclick="setTool('hand');">Hand</div>
					<div class="draw" onclick="setTool('pen');">Draw</div>
					<div class="select" onclick="setTool('select');">Select</div>
				</div>
				<div class="gates">
					<div class="and gate" onclick="setTool('andgate');">and</div>
					<div class="not gate" onclick="setTool('notgate');">not</div>
					<div class="or gate" onclick="setTool('orgate');">or</div>
					<div class="xor gate" onclick="setTool('xorgate');">xor</div>
				</div>
			</div>
			<div class="canvasWrap">
				<canvas id="canvas"></canvas>
			</div>
			<div class="manager"></div>
			<div class="bottom"></div>
		</main>

		<script src="./script.js"></script>
	</body>
</html>
